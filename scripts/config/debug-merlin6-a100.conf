#!/bin/bash

#
# Configuration file for tests on A100 GPUs on Merlin6
#

#-------------------------------------------------------------------------------
# Branches 
#
branch="master"
regtests_branch="master"

#-------------------------------------------------------------------------------
# Architecture
#
architecture="gpu-cuda-a100"

#-------------------------------------------------------------------------------
# CMake args
#
cmake_args+=("-DBUILD_TYPE=Debug")
cmake_args+=("-DPLATFORMS=CUDA")
cmake_args+=("-DARCH=AMPERE80")
cmake_args+=("-DOPALX_ENABLE_UNIT_TESTS=ON")
cmake_args+=("-DHeffte_VERSION=git.v2.4.1")
cmake_args+=("-DKokkos_VERSION=4.7.01")

#-------------------------------------------------------------------------------
# OPALX args 
#
#opalx_args=()

#-------------------------------------------------------------------------------
# Unit tests: set to 'yes' to run ctest -L unit after build
#
do_unittests='yes'
#unittests_args=()

#-------------------------------------------------------------------------------
# Modules 
#

module purge
module use unstable
module load xpmem/2.6.5 # temporarily
module load gcc/12.4.0 openmpi/4.1.6_slurm
module load gnutls
module load Python
module load gnuplot
module load cmake/3.27.8
